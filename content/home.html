<div class="home-content">
    <h2 style="text-align: center;">Добавить заметку</h2>

    <form id="note-form" class="row" autocomplete="off">
        <input
            class="col-9"
            type="text"
            id="note-input"
            placeholder="Введите текст заметки"
            required
        >
        <button class="col-3 button primary" type="submit">Добавить</button>
    </form>

    <form id="reminder-form" class="row" autocomplete="off" style="margin-top: 1rem;">
        <input
            class="col-5"
            type="text"
            id="reminder-text"
            placeholder="Текст напоминания"
            required
        >
        <input
            class="col-4"
            type="datetime-local"
            id="reminder-time"
            required
        >
        <button class="col-3 button success" type="submit">+ Напоминание</button>
    </form>

    <h2 style="text-align: center; margin-top: 2rem;">Список заметок</h2>

    <ul id="notes-list" style="list-style: none; padding-left: 0;"></ul>

    <p class="text-light" style="margin-top: 2rem; font-size: 0.85rem;">
        Заметки хранятся в <code>localStorage</code>. Напоминания планируются
        на сервере через <code>setTimeout</code>. По push-уведомлению можно
        нажать «Отложить на 5 минут» — сервер перенесёт напоминание.
    </p>
</div>
