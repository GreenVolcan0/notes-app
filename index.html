<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки — App Shell + HTTPS (практика 13–15)</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4285f4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Заметки">
    <link rel="apple-touch-icon" href="./icons/icon-152x152.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png">

    <link rel="stylesheet" href="https://unpkg.com/chota@latest">

    <style>
        body { padding: 24px; max-width: 900px; margin: 0 auto; }

        /* Шапка приложения — часть App Shell. */
        header h1 { margin-bottom: 0.5rem; line-height: 1.2; }
        header .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }

        /* Навигация — две кнопки-вкладки. */
        nav.tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #eee;
            margin-bottom: 1rem;
        }
        nav.tabs button {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 10px 16px;
            font-size: 1rem;
            cursor: pointer;
            color: #555;
            margin-bottom: -2px;     /* чтобы активная линия села на нижнюю границу nav */
            transition: color 0.15s, border-color 0.15s;
        }
        nav.tabs button:hover { color: #4285f4; }
        nav.tabs button.active {
            color: #4285f4;
            border-bottom-color: #4285f4;
            font-weight: 600;
        }

        /* Индикатор сети и индикатор загрузки контента. */
        #network-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }
        #network-status.online  { background: #d4edda; color: #155724; }
        #network-status.offline { background: #f8d7da; color: #721c24; }

        /* «Скелетон» для контейнера, пока fetch не выполнится. */
        #app-content .loading {
            text-align: center;
            color: #999;
            padding: 2rem 0;
        }

        /* Карточки заметок (стилизуем <li>, который рисует initNotes). */
        #notes-list li {
            background: #f7f7f7;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        #notes-list li .meta { color: #888; font-size: 0.8rem; }

        /* Бейдж напоминания (практика 17): подсветим заметки с reminder. */
        .reminder-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            background: #fff3cd;
            color: #7a5b00;
            border: 1px solid #ffe9a0;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .delete-btn {
            background: transparent;
            border: 1px solid #c00;
            color: #c00;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-btn:hover { background: #c00; color: #fff; }

        /* ===== Практика 16: кнопки push и toast реал-тайм ===== */

        /* Подвал с кнопками включить/отключить уведомления. */
        footer.push-controls {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            text-align: center;
        }
        footer.push-controls button {
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
        #enable-push  { background: #28a745; color: #fff; }
        #enable-push:hover  { background: #218838; }
        #disable-push { background: #dc3545; color: #fff; }
        #disable-push:hover { background: #c82333; }

        /* Toast — всплывающее сообщение по событию taskAdded из WebSocket. */
        .toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #4285f4;
            color: #fff;
            padding: 12px 18px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,.18);
            z-index: 1000;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity .25s, transform .25s;
            max-width: 320px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>

<body>
    <header>
        <h1>«Заметки» — PWA с App Shell</h1>
        <p class="subtitle">
            Каркас грузится из кэша мгновенно, контент — через fetch (Network First).
        </p>

        <!-- Индикатор сети, обновляется в app.js по событиям online/offline. -->
        <p>
            Состояние сети:
            <span id="network-status" class="online">проверяется…</span>
        </p>
        <nav class="tabs" role="tablist">
            <button id="home-btn"  class="active" data-page="home">Главная</button>
            <button id="about-btn"                data-page="about">О приложении</button>
        </nav>
    </header>

    <main id="app-content">
        <p class="loading">Загрузка…</p>
    </main>

    <footer class="push-controls">
        <button id="enable-push"  type="button">Включить уведомления</button>
        <button id="disable-push" type="button" style="display:none;">Отключить уведомления</button>
        <p style="margin-top: 8px; color: #666; font-size: 0.85rem;">
            При добавлении задачи во второй вкладке (или другим клиентом)
            вы получите toast в реальном времени и системное push-уведомление.
        </p>
    </footer>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
            integrity="sha384-2huaZvOR9iDzHqslqwpR87isEmrfxqyWOF7hr7BY6KG0+hVKLoEXMPUJw3ynWuhO"
            crossorigin="anonymous"></script>

    <!-- Основной скрипт приложения. -->
    <script src="app.js"></script>
</body>
</html>
